<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>予約入力 | TravelNest Demo</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <script src="data/master.js"></script>
  <script src="js/app.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/layout.js"></script>

  <div class="page-wrap" style="margin-top:80px;max-width:720px">
    <!-- ステップバー -->
    <div class="step-bar">
      <div class="step-item active" id="step1-tab" data-i18n-en="① Guest Information">① 予約入力</div>
      <div class="step-item" id="step2-tab" data-i18n-en="② Confirm Booking">② 内容確認</div>
      <div class="step-item" id="step3-tab" data-i18n-en="③ Booking Complete">③ 予約完了</div>
    </div>

    <!-- STEP 1 -->
    <div id="step1">
      <div class="form-section" style="margin-bottom:16px">
        <h3 data-i18n-en="🏨 Hotel">🏨 予約ホテル</h3>
        <div id="hotel-summary"></div>
      </div>

      <div class="form-section" style="margin-bottom:16px">
        <h3 data-i18n-en="📋 Guest Information">📋 代表者情報</h3>
        <div class="alert alert-warn" style="margin-bottom:16px" data-i18n-en="⚠️ Overlapping bookings are automatically checked when proceeding to confirmation.">
          ⚠️ 期間の重複する予約は確認画面への進行時に自動チェックされます。
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group" id="g-sei">
            <label data-i18n-en="Last Name *">姓（漢字）*</label>
            <input type="text" id="b-sei" placeholder="山田" data-i18n-ph-en="Last Name">
            <span class="error-msg" data-i18n-en="Required">必須項目です</span>
          </div>
          <div class="form-group" id="g-mei">
            <label data-i18n-en="First Name *">名（漢字）*</label>
            <input type="text" id="b-mei" placeholder="太郎" data-i18n-ph-en="First Name">
            <span class="error-msg" data-i18n-en="Required">必須項目です</span>
          </div>
          <div class="form-group" id="g-kana-sei">
            <label data-i18n-en="Last Name (Reading) *">姓（フリガナ）*</label>
            <input type="text" id="b-kana-sei" placeholder="ヤマダ" data-i18n-ph-en="Reading">
            <span class="error-msg" data-i18n-en="Required">必須項目です</span>
          </div>
          <div class="form-group" id="g-kana-mei">
            <label data-i18n-en="First Name (Reading) *">名（フリガナ）*</label>
            <input type="text" id="b-kana-mei" placeholder="タロウ" data-i18n-ph-en="Reading">
            <span class="error-msg" data-i18n-en="Required">必須項目です</span>
          </div>
          <div class="form-group" id="g-phone">
            <label data-i18n-en="Phone Number *">電話番号 *</label>
            <input type="tel" id="b-phone" placeholder="090-XXXX-XXXX">
            <span class="error-msg" data-i18n-en="Please enter a valid format">正しい形式で入力してください</span>
          </div>
          <div class="form-group" id="g-email">
            <label data-i18n-en="Email Address *">メールアドレス *</label>
            <input type="email" id="b-email" placeholder="user@example.com">
            <span class="error-msg" data-i18n-en="Please enter a valid email address">正しいメールアドレスを入力してください</span>
          </div>
        </div>
        <div class="form-group" style="margin-top:12px">
          <label data-i18n-en="Special Requests (optional, max 200 chars)">特別リクエスト（任意・200文字以内）</label>
          <textarea id="b-special" rows="3" maxlength="200" placeholder="禁煙室希望、高層階希望、記念日サービス希望など" data-i18n-ph-en="Non-smoking room, high floor, anniversary service, etc."></textarea>
          <span class="hint" data-i18n-en="We may not be able to accommodate all requests (demo only — no actual records kept).">ご要望に添えない場合もございます（デモのため記録のみ）</span>
        </div>
      </div>

      <div id="err-step1" class="alert alert-danger hidden"></div>

      <div style="text-align:right">
        <button id="btn-confirm" class="btn btn-primary" style="font-size:15px;padding:12px 36px" onclick="goToStep2()" data-i18n-en="Review Booking →">
          入力内容を確認する →
        </button>
      </div>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="hidden">
      <div class="form-section" style="margin-bottom:16px">
        <h3 data-i18n-en="✅ Confirm Your Booking">✅ 予約内容のご確認</h3>
        <table class="confirm-table" id="confirm-table"></table>
      </div>

      <div id="err-step2" class="alert alert-danger hidden"></div>

      <div style="display:flex;gap:12px;justify-content:space-between">
        <button id="btn-back" class="btn btn-secondary" onclick="backToStep1()" data-i18n-en="← Edit Information">← 入力内容を修正する</button>
        <button id="btn-complete" class="btn btn-success" style="font-size:15px;padding:12px 36px" onclick="confirmBooking()" data-i18n-en="Confirm Booking ✔">
          予約を確定する ✔
        </button>
      </div>
    </div>

    <!-- STEP 3 -->
    <div id="step3" class="hidden">
      <div class="form-section" style="text-align:center;padding:40px 28px">
        <div style="font-size:64px;margin-bottom:16px">✅</div>
        <h2 style="font-size:24px;color:var(--success);margin-bottom:8px" data-i18n-en="Booking Complete!">予約が完了しました！</h2>
        <p style="color:var(--gray);margin-bottom:24px" data-i18n-en="A confirmation email has been sent (no actual email is sent in this demo).">確認メールをお送りしました（デモのため実際には送信されません）</p>

        <div class="booking-no-box">
          <div class="label" data-i18n-en="Booking Number">予約番号</div>
          <div class="number" id="complete-no"></div>
        </div>

        <div id="complete-summary" style="text-align:left;margin:20px 0"></div>

        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <a href="mypage.html" class="btn btn-primary" data-i18n-en="View Booking History">予約履歴を確認する</a>
          <a href="index.html" class="btn btn-secondary" data-i18n-en="Back to Home">トップに戻る</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    let bookingHotel = null;
    let sp = {};
    let formData = {};

    document.addEventListener("DOMContentLoaded", () => {
      buildPage({ title: "予約入力" });
      if (!App.requireLogin()) return;

      sp = App.loadSearchParams();
      if (!sp.hotelId) { I18n.go("search.html"); return; }
      if (!sp.checkin || !sp.checkout) { I18n.go(`date-select.html?hotelId=${sp.hotelId}`); return; }

      bookingHotel = App.getHotelById(sp.hotelId);
      if (!bookingHotel) { I18n.go("search.html"); return; }

      // ホテルサマリー
      const nights = App.calcNights(sp.checkin, sp.checkout);
      const price  = sp.roomPrice || bookingHotel.priceBase;
      const total  = price * nights * (sp.rooms || 1);

      document.getElementById("hotel-summary").innerHTML = `
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
          <div style="font-size:36px">${App.getRegionById(bookingHotel.region)?.emoji || "🏨"}</div>
          <div>
            <div style="font-size:16px;font-weight:700">${bookingHotel.name}</div>
            <div style="font-size:13px;color:var(--gray)">📍 ${App.regionName(bookingHotel.region)} &nbsp; ${App.starsHtml(bookingHotel.stars)}</div>
          </div>
          <div style="margin-left:auto;text-align:right">
            <div style="font-size:12px;color:var(--gray)">${App.fmtDateJP(sp.checkin)} → ${App.fmtDateJP(sp.checkout)}</div>
            <div style="font-size:12px;color:var(--gray)">${I18n.t(`${nights}泊 / 大人${sp.guests || 2}名 / ${sp.roomType || "スタンダードダブル"}`, `${nights} night(s) / ${sp.guests || 2} adult(s) / ${sp.roomType || "Standard Double"}`)}</div>
            <div style="font-size:20px;font-weight:700;color:var(--primary)">${App.fmtPrice(total)}</div>
          </div>
        </div>`;

      // ログインユーザーの情報を自動補完
      const u = App.currentUser();
      if (u) {
        const [sei, mei] = u.name.split(" ");
        document.getElementById("b-sei").value  = sei || "";
        document.getElementById("b-mei").value  = mei || "";
        document.getElementById("b-email").value = u.email;
        document.getElementById("b-phone").value = u.phone;
      }

      sp.totalPrice = total;
      sp.nights = nights;
      App.saveSearchParams(sp);
    });

    function goToStep2() {
      const sei      = document.getElementById("b-sei").value.trim();
      const mei      = document.getElementById("b-mei").value.trim();
      const kanaSei  = document.getElementById("b-kana-sei").value.trim();
      const kanaMei  = document.getElementById("b-kana-mei").value.trim();
      const phone    = document.getElementById("b-phone").value.trim();
      const email    = document.getElementById("b-email").value.trim();
      const special  = document.getElementById("b-special").value.trim();

      let valid = true;
      const req = [
        ["g-sei",sei], ["g-mei",mei], ["g-kana-sei",kanaSei],
        ["g-kana-mei",kanaMei], ["g-phone",phone], ["g-email",email]
      ];
      req.forEach(([id, val]) => {
        const g = document.getElementById(id);
        if (!val) { g.classList.add("has-error"); valid = false; }
        else g.classList.remove("has-error");
      });
      if (!email.includes("@")) { document.getElementById("g-email").classList.add("has-error"); valid = false; }

      if (!valid) {
        document.getElementById("err-step1").textContent = I18n.t("必須項目を正しく入力してください。","Please fill in all required fields correctly.");
        document.getElementById("err-step1").classList.remove("hidden");
        return;
      }
      document.getElementById("err-step1").classList.add("hidden");

      formData = { sei, mei, kanaSei, kanaMei, phone, email, special };

      // 確認テーブル
      const nights = sp.nights || App.calcNights(sp.checkin, sp.checkout);
      const total  = sp.totalPrice || (bookingHotel.priceBase * nights);
      const rows = [
        ["hotel",       I18n.t("ホテル","Hotel"),               bookingHotel.name],
        ["room-type",   I18n.t("部屋タイプ","Room Type"),       sp.roomType || I18n.t("スタンダードダブル","Standard Double")],
        ["checkin",     I18n.t("チェックイン","Check-in"),       App.fmtDateJP(sp.checkin)],
        ["checkout",    I18n.t("チェックアウト","Check-out"),    App.fmtDateJP(sp.checkout)],
        ["nights",      I18n.t("宿泊数 / 人数","Nights / Guests"), I18n.t(`${nights}泊 / 大人${sp.guests || 2}名`,`${nights} night(s) / ${sp.guests || 2} adult(s)`)],
        ["guest-name",  I18n.t("代表者氏名","Guest Name"),      `${sei} ${mei}（${kanaSei} ${kanaMei}）`],
        ["phone",       I18n.t("電話番号","Phone"),             phone],
        ["email",       I18n.t("メールアドレス","Email"),       email],
        ...(special ? [[  "special", I18n.t("特別リクエスト","Special Request"), special]] : []),
        ["total",       I18n.t("合計金額","Total Amount"),      App.fmtPrice(total)],
      ];
      const tbody = document.getElementById("confirm-table");
      tbody.innerHTML = rows.map(([key,k,v]) => `<tr data-field="${key}"><td>${k}</td><td id="confirm-${key}" class="confirm-value">${v}</td></tr>`).join("");

      document.getElementById("step1").classList.add("hidden");
      document.getElementById("step2").classList.remove("hidden");
      document.getElementById("step1-tab").className = "step-item done";
      document.getElementById("step2-tab").className = "step-item active";
      window.scrollTo(0,0);
    }

    function backToStep1() {
      document.getElementById("step2").classList.add("hidden");
      document.getElementById("step1").classList.remove("hidden");
      document.getElementById("step1-tab").className = "step-item active";
      document.getElementById("step2-tab").className = "step-item";
    }

    function confirmBooking() {
      const res = App.createBooking({
        userId:    App.currentUser().id,
        hotelId:   sp.hotelId,
        checkin:   sp.checkin,
        checkout:  sp.checkout,
        guests:    +(sp.guests || 2),
        rooms:     +(sp.rooms || 1),
        roomType:  sp.roomType || "スタンダードダブル",
        totalPrice:sp.totalPrice || bookingHotel.priceBase * App.calcNights(sp.checkin, sp.checkout),
        specialRequest: formData.special,
      });

      if (!res.ok) {
        document.getElementById("err-step2").textContent = res.msg;
        document.getElementById("err-step2").classList.remove("hidden");
        return;
      }

      // 完了画面
      document.getElementById("step2").classList.add("hidden");
      document.getElementById("step3").classList.remove("hidden");
      document.getElementById("step2-tab").className = "step-item done";
      document.getElementById("step3-tab").className = "step-item active";

      document.getElementById("complete-no").textContent = res.booking.bookingNo;
      document.getElementById("complete-summary").innerHTML = `
        <table class="confirm-table">
          <tr><td>${I18n.t("ホテル","Hotel")}</td><td id="complete-hotel">${bookingHotel.name}</td></tr>
          <tr><td>${I18n.t("チェックイン","Check-in")}</td><td id="complete-checkin">${App.fmtDateJP(sp.checkin)}</td></tr>
          <tr><td>${I18n.t("チェックアウト","Check-out")}</td><td id="complete-checkout">${App.fmtDateJP(sp.checkout)}</td></tr>
          <tr><td>${I18n.t("合計金額","Total Amount")}</td><td id="complete-total">${App.fmtPrice(res.booking.totalPrice)}</td></tr>
        </table>`;

      window.scrollTo(0,0);
      // 検索パラメータをクリア
      App.saveSearchParams({});
    }
  </script>
</body>
</html>
