<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body { margin: 0; padding: 0; background: white; overflow: hidden; }
    body { padding: 8px; }
    .avail-ok.clickable {
      cursor: pointer;
      transition: background .15s;
    }
    .avail-ok.clickable:hover {
      background: #6EE7B7 !important;
      color: #065F46;
    }
  </style>
</head>
<body>
  <script src="data/master.js"></script>
  <script src="js/app.js"></script>
  <script src="js/i18n.js"></script>

  <div id="avail-wrap"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params  = new URLSearchParams(window.location.search);
      const hotelId = params.get("id");
      const wrap    = document.getElementById("avail-wrap");

      if (!hotelId) { wrap.textContent = "ホテルIDが指定されていません。"; return; }

      const avail = App.checkAvailability(hotelId, null, null);
      if (!avail || !avail.days) { wrap.textContent = "データを取得できませんでした。"; return; }

      const days      = avail.days;
      const DOW       = I18n.isEN() ? ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"] : ["日","月","火","水","木","金","土"];
      const DOW_COLOR = { 0: "#DC2626", 6: "#0D9488" };

      // 日曜始まりになるよう先頭に空白スロットを追加
      const leadingEmpties = days[0].dow; // 0=日 → 0個, 1=月 → 1個, ...
      const sundayStart = new Date(days[0].date + "T00:00:00");
      sundayStart.setDate(sundayStart.getDate() - leadingEmpties);

      const allSlots = [];
      for (let i = 0; i < leadingEmpties; i++) {
        const d = new Date(sundayStart);
        d.setDate(sundayStart.getDate() + i);
        allSlots.push({ date: App.fmtDate(d), dow: d.getDay(), available: null, disabled: true });
      }
      allSlots.push(...days);
      // 末尾を土曜まで埋める
      while (allSlots.length % 7 !== 0) {
        const last = new Date(allSlots[allSlots.length - 1].date + "T00:00:00");
        last.setDate(last.getDate() + 1);
        allSlots.push({ date: App.fmtDate(last), dow: last.getDay(), available: null, disabled: true });
      }

      // 7列ずつ週に分割
      const weeks = [];
      for (let i = 0; i < allSlots.length; i += 7) weeks.push(allSlots.slice(i, i + 7));

      let html = '<table class="avail-table">';
      weeks.forEach(week => {
        // 日付ヘッダー行
        html += "<tr>" + week.map(d => {
          const c   = DOW_COLOR[d.dow] || "inherit";
          const dt  = new Date(d.date + "T00:00:00");
          const dim = d.disabled ? ' style="opacity:0.3"' : '';
          return `<th${dim}>${dt.getMonth()+1}/${dt.getDate()}<br><span style="color:${c}">${DOW[d.dow]}</span></th>`;
        }).join("") + "</tr>";

        // 空き状況行
        html += "<tr>" + week.map(d => {
          if (d.disabled) return `<td class="avail-ng" style="opacity:0.3">-</td>`;
          if (d.available) {
            return `<td class="avail-ok clickable" onclick="goBook('${d.date}')" title="${d.date} ${I18n.t('でチェックイン →日程選択へ','→ Select Dates')}">${I18n.t('空あり','Available')}</td>`;
          } else {
            return `<td class="avail-ng">${I18n.t('満　室','Sold Out')}</td>`;
          }
        }).join("") + "</tr>";
      });
      html += "</table>";
      html += `<div style="display:flex;gap:14px;margin-top:8px;font-size:12px;color:#64748B;flex-wrap:wrap">
        <span><span style="display:inline-block;width:12px;height:12px;background:#D1FAE5;border:1px solid #CBD5E1;vertical-align:middle;margin-right:4px"></span>${I18n.t('空あり（クリックで日程選択）','Available (click to select dates)')}</span>
        <span><span style="display:inline-block;width:12px;height:12px;background:#FEE2E2;border:1px solid #CBD5E1;vertical-align:middle;margin-right:4px"></span>${I18n.t('満室','Sold Out')}</span>
        <span style="margin-left:auto;font-size:11px">${I18n.t('※ 先14日間表示','* Showing next 14 days')}</span>
      </div>`;

      wrap.innerHTML = html;

      setTimeout(() => {
        const h = document.getElementById("avail-wrap").offsetHeight + 16;
        window.parent.postMessage({ type: "availFrameHeight", height: h }, "*");
      }, 80);
    });

    function goBook(date) {
      // チェックアウトをチェックイン翌日に自動設定
      const coDate = new Date(date + "T00:00:00"); coDate.setDate(coDate.getDate() + 1);
      const hotelId = new URLSearchParams(window.location.search).get("id");
      const sp = App.loadSearchParams();
      sp.hotelId  = hotelId;
      sp.checkin  = date;
      sp.checkout = App.fmtDate(coDate);
      App.saveSearchParams(sp);
      window.parent.location.href = I18n.urlWith(`date-select.html?hotelId=${hotelId}`);
    }
  </script>
</body>
</html>
