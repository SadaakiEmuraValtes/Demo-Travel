<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ログイン | TravelNest Demo</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <script src="data/master.js"></script>
  <script src="js/app.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/layout.js"></script>

  <div class="page-wrap" style="margin-top:80px;max-width:440px">
    <div style="text-align:center;margin-bottom:28px">
      <a href="index.html" style="font-size:24px;font-weight:700;color:var(--primary);text-decoration:none">✈ TravelNest</a>
      <div style="font-size:13px;color:var(--gray);margin-top:4px" data-i18n-en="Demo Site">デモサイト</div>
    </div>

    <div class="form-section">
      <h2 style="font-size:20px;color:var(--accent);margin-bottom:20px;text-align:center" data-i18n-en="Log In">ログイン</h2>

      <div id="login-err" class="alert alert-danger hidden" style="margin-bottom:16px"></div>

      <div class="form-group mb-16" id="g-email">
        <label data-i18n-en="Email Address *">メールアドレス *</label>
        <input type="email" id="email" placeholder="user@example.com" autocomplete="email"
          onkeydown="if(event.key==='Enter')doLogin()">
        <span class="error-msg" data-i18n-en="Please enter your email address">メールアドレスを入力してください</span>
      </div>
      <div class="form-group mb-16" id="g-pw">
        <label data-i18n-en="Password *">パスワード *</label>
        <input type="password" id="password" placeholder="パスワード" data-i18n-ph-en="Password"
          onkeydown="if(event.key==='Enter')doLogin()">
        <span class="error-msg" data-i18n-en="Please enter your password">パスワードを入力してください</span>
      </div>

      <button id="btn-login" class="btn btn-primary" style="width:100%;font-size:15px;padding:12px;margin-bottom:12px" onclick="doLogin()" data-i18n-en="Log In">
        ログイン
      </button>

      <div style="text-align:center;margin:16px 0;color:var(--gray);font-size:13px;position:relative">
        <span style="background:white;padding:0 12px;position:relative;z-index:1" data-i18n-en="or">または</span>
        <hr style="position:absolute;top:50%;width:100%;border:none;border-top:1px solid var(--gray-bd)">
      </div>

      <button class="btn" style="width:100%;background:var(--accent);color:white;padding:12px;margin-bottom:20px;font-size:14px" onclick="App.showToast(I18n.t('Googleログインはデモでは利用できません','Google login is not available in this demo.'),'info')" data-i18n-en="🔵 Log In with Google (not available in demo)">
        🔵 Googleでログイン（デモ未対応）
      </button>

      <p style="text-align:center;font-size:13px;color:var(--gray)">
        <span data-i18n-en="New here?">アカウントをお持ちでない方は</span>
        <a href="register.html" data-i18n-en="Sign Up">新規会員登録</a>
      </p>
    </div>

    <div class="alert alert-info" style="margin-top:20px;font-size:13px">
      🧪 <strong data-i18n-en="Test Accounts">テストアカウント</strong><span data-i18n-en=" are available for testing.">でお試しいただけます。</span><br>
      <a href="help.html#accounts" data-i18n-en="View Test Accounts →">テストアカウント一覧を見る →</a>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      buildPage({ title: I18n.t("ログイン","Log In") });
      if (App.isLoggedIn()) I18n.go("mypage.html");
      document.getElementById("email").focus();
    });

    function doLogin() {
      const email = document.getElementById("email").value.trim();
      const pw    = document.getElementById("password").value;
      const errEl = document.getElementById("login-err");

      document.getElementById("g-email").classList.remove("has-error");
      document.getElementById("g-pw").classList.remove("has-error");

      if (!email) { document.getElementById("g-email").classList.add("has-error"); return; }
      if (!pw)    { document.getElementById("g-pw").classList.add("has-error"); return; }

      App.showLoading(I18n.t("ログイン中...","Logging in..."));
      const delay = 3000 + Math.random() * 2000;
      setTimeout(() => {
        App.hideLoading();
        const res = App.login(email, pw);
        if (!res.ok) {
          errEl.textContent = res.msg;
          errEl.classList.remove("hidden");
          return;
        }
        App.showToast(I18n.t(`ようこそ、${res.user.name}さん！`,`Welcome, ${res.user.name}!`), "success");
        const redir = sessionStorage.getItem("tn_redirect_after_login");
        setTimeout(() => {
          if (redir) { sessionStorage.removeItem("tn_redirect_after_login"); window.location.href = redir; }
          else I18n.go("mypage.html");
        }, 500);
      }, delay);
    }
  </script>
</body>
</html>
